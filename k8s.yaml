apiVersion: batch/v1
kind: Job
metadata:
  name: playwright-test-job
spec:
  template:
    spec:
      containers:
      - name: playwright
        # Use the image you already pushed
        image: niyazautomationqa/playwright-tests:latest
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c"]
        args:
          - |

            echo "--- CHECKING FILES IN CONTAINER ---"
            find ./tests -name "*.spec.ts" | wc -l
            
            echo "--- LISTING ALL DISCOVERED SMOKE TESTS ---"
            npx playwright test --list --grep @smoke
            
            echo "--- STARTING TEST EXECUTION ---"
            yarn test:smoke
            
            echo "--- SYNCING RESULTS TO PVC ---"
            sleep 5
        resources:
          limits:
            cpu: "2"
            memory: "4Gi"
          requests:
            cpu: "1"
            memory: "2Gi"
        volumeMounts:
        - name: allure-results-storage
          mountPath: /app/allure-results
      restartPolicy: Never
      volumes:
      - name: allure-results-storage
        persistentVolumeClaim:
          # Note: Ensure you have created this PVC in Minikube first
          claimName: allure-pvc
  backoffLimit: 0