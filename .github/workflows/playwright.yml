name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm install -g yarn && yarn
      - name: Install Playwright Browsers
        run: yarn playwright install --with-deps
      - name: Install Allure Commandline
        if: always()
        run: |
          npm i -D @playwright/test allure-playwright
          npm install -g allure-commandline
        timeout-minutes: 5
      - name: Run Playwright tests
        run: yarn test
      - name: Genrerate Allure Report
        run: npm run allure 
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
              playwright-report/
              allure-results/
              allure-report/
          retention-days: 30
      - name: Upload Allure Report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main' && hashFiles('allure-report/**/*') != ''
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git checkout --orphan gh-pages-temp
          find . -mindepth 1 -maxdepth 1 -not -name 'allure-report' -not -name '.git' -exec rm -rf {} \;
          cp -r allure-report/* .
          rm -rf allure-report
          git add .
          git commit -m "Deploy Allure report to GitHub Pages"
          git push origin gh-pages-temp:gh-pages --force
        timeout-minutes: 5
